<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심화 미적분 - 테일러 급수 형성 과정 동적 시뮬레이터</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-panel: rgba(15, 23, 42, 0.95);
            --border-color: #1e293b;
            --text-main: #f3f4f6;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-rose: #f43f5e;
            --accent-purple: #c084fc;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg-main);
            font-family: 'Malgun Gothic', -apple-system, sans-serif;
            color: var(--text-main);
        }

        #app-container { display: flex; width: 100vw; height: 100vh; }
        #canvas-container { flex: 1; height: 100%; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }

        #sidebar {
            width: 420px; height: 100%; background: var(--bg-panel);
            border-left: 1px solid var(--border-color); backdrop-filter: blur(12px);
            padding: 25px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 20px; overflow-y: auto;
            z-index: 10; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        h2 { margin: 0; color: var(--accent-blue); font-size: 1.25rem; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .section-title { font-size: 0.9rem; font-weight: bold; color: var(--text-muted); margin-bottom: 5px; }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        select, button {
            background: #1e293b; color: var(--text-main); border: 1px solid var(--border-color);
            padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: all 0.2s;
        }
        select:hover { background: #334155; border-color: var(--accent-blue); }
        
        /* 빌드업 재생 버튼 커스텀 */
        #btn-animate {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            border: none; font-weight: bold; font-size: 1rem; box-shadow: 0 4px 12px rgba(3,105,161,0.3);
        }
        #btn-animate:hover { background: linear-gradient(135deg, #0369a1, #075985); transform: translateY(-1px); }

        .slider-wrapper {
            background: rgba(30, 41, 59, 0.4); border: 1px solid var(--border-color);
            padding: 15px; border-radius: 10px;
        }
        input[type=range] { width: 100%; height: 6px; border-radius: 3px; accent-color: var(--accent-blue); margin-top: 8px; }

        .data-card {
            background: rgba(30, 41, 59, 0.6); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 15px; display: flex; flex-direction: column; gap: 8px;
        }
        
        .formula-box {
            background: #1e293b; padding: 15px; border-radius: 8px;
            font-size: 0.95rem; font-family: 'Courier New', monospace;
            line-height: 1.6; white-space: pre-wrap; word-break: break-all;
        }

        /* 수식 빌드업 애니메이션 하이라이트 효과 */
        .term-active { color: var(--accent-rose); font-weight: bold; text-decoration: underline; background: rgba(244,63,94,0.15); padding: 2px 4px; border-radius: 4px; }
        .term-past { color: var(--text-main); opacity: 0.8; }
        .term-future { color: var(--text-muted); opacity: 0.25; }

        .legend { display: flex; flex-direction: column; gap: 6px; font-size: 0.85rem; margin-top: 5px; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .color-dot { width: 14px; height: 4px; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="canvas-container">
            <canvas id="graphCanvas"></canvas>
        </div>

        <div id="sidebar">
            <h2>과정 중심 테일러 시뮬레이터</h2>
            
            <div class="control-group">
                <div class="section-title">대상 초월함수 선택</div>
                <select id="select-func">
                    <option value="sin">f(x) = sin(x)</option>
                    <option value="cos">f(x) = cos(x)</option>
                    <option value="exp">f(x) = e^x</option>
                </select>
            </div>

            <div class="slider-wrapper">
                <div style="display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px;">
                    <span>최종 도달 목표 차수 (Max $n$)</span>
                    <span id="lbl-degree" style="color:var(--accent-blue); font-weight:bold;">5</span>
                </div>
                <input type="range" id="slider-degree" min="1" max="13" step="2" value="5">
                
                <hr style="border-color: var(--border-color); margin: 12px 0;">
                
                <button id="btn-animate" style="width:100%;">⚡ 급수 합성과정 애니메이션 재생</button>
            </div>

            <div class="data-card">
                <div class="section-title" id="lbl-step-info">현재 상태: 대기 중</div>
                <div class="legend">
                    <div class="legend-item"><span class="color-dot" style="background:var(--accent-green)"></span>원본 초월함수 $f(x)$</div>
                    <div class="legend-item"><span class="color-dot" style="background:var(--accent-rose)"></span>직전 단계까지 누적된 다항식 $P_{n-1}(x)$</div>
                    <div class="legend-item"><span class="color-dot" style="border-top:2px dashed var(--accent-purple)"></span>현재 순서에서 새로 유입되는 단독 항 고유 곡선</div>
                </div>
            </div>

            <div class="data-card">
                <div class="section-title">급수 누적 전개 과정 (실시간 매핑)</div>
                <div id="box-formula" class="formula-box"></div>
            </div>

            <button id="btn-reset" style="width:100%; background:transparent; color:var(--text-muted);">그래프 시점 초기화</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');

        let currentFunc = 'sin';
        let targetMaxDegree = 5; 
        
        // 애니메이션 컨트롤 변수들
        let currentAnimStep = 0;   // 현재 애니메이션이 보여주고 있는 항의 인덱스
        let isAnimating = false;
        let animProgress = 1.0;    // 0.0에서 1.0으로 가면서 선이 합성되는 모션 연출용
        let lastTimestamp = 0;

        let scale = 90;
        let originX = 0, originY = 0;

        function factorial(num) {
            if (num <= 1) return 1;
            let res = 1;
            for (let i = 2; i <= num; i++) res *= i;
            return res;
        }

        const Functions = {
            sin: Math.sin, cos: Math.cos, exp: Math.exp
        };

        // 각 함수별 n번째 실제로 유효하게 존재하는 다항식 항들의 목록 배열 반환
        function getActiveTerms(func, maxDeg) {
            let terms = [];
            if (func === 'sin') {
                for (let i = 0; 2 * i + 1 <= maxDeg; i++) terms.push(2 * i + 1);
            } else if (func === 'cos') {
                terms.push(0);
                for (let i = 1; 2 * i <= maxDeg; i++) terms.push(2 * i);
            } else if (func === 'exp') {
                for (let i = 0; i <= maxDeg; i++) terms.push(i);
            }
            return terms;
        }

        // 단 한 개의 특정 단독 차수 항값만 계산 f_n(x)
        function calcSingleTerm(func, x, termDeg) {
            if (func === 'sin') {
                let i = (termDeg - 1) / 2;
                return Math.pow(-1, i) * Math.pow(x, termDeg) / factorial(termDeg);
            } else if (func === 'cos') {
                let i = termDeg / 2;
                return Math.pow(-1, i) * Math.pow(x, termDeg) / factorial(termDeg);
            } else if (func === 'exp') {
                return Math.pow(x, termDeg) / factorial(termDeg);
            }
            return 0;
        }

        // 특정 스텝까지 축적된 누적 다항식 값 계산
        function calcAccumulated(func, x, activeTerms, upToStepIndex) {
            let sum = 0;
            for (let i = 0; i <= upToStepIndex; i++) {
                if (i >= activeTerms.length) break;
                sum += calcSingleTerm(func, x, activeTerms[i]);
            }
            return sum;
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            originX = canvas.width / 2;
            originY = canvas.height / 2;
            draw();
        }

        // 텍스트 수식 창 동적 렌더링 시스템
        function renderFormulaUI(activeTerms, currentIdx, progress) {
            const box = document.getElementById('box-formula');
            box.innerHTML = "";
            
            let baseText = "f(x) ≈ ";
            let spanBase = document.createElement('span');
            spanBase.innerText = baseText;
            box.appendChild(spanBase);

            if (activeTerms.length === 0) return;

            activeTerms.forEach((deg, idx) => {
                let span = document.createElement('span');
                
                // 각 함수별 예쁜 부호 처리 규칙
                let termStr = "";
                if (currentFunc === 'sin') {
                    let k = (deg - 1) / 2;
                    let sign = k % 2 === 0 ? (k === 0 ? "" : " + ") : " - ";
                    termStr = sign + (deg === 1 ? "x" : `(x^${deg})/${deg}!`);
                } else if (currentFunc === 'cos') {
                    let k = deg / 2;
                    let sign = k % 2 === 0 ? " + " : " - ";
                    termStr = deg === 0 ? "1" : sign + `(x^${deg})/${deg}!`;
                } else if (currentFunc === 'exp') {
                    let sign = idx === 0 ? "" : " + ";
                    termStr = sign + (deg === 0 ? "1" : (deg === 1 ? "x" : `(x^${deg})/${deg}!`));
                }

                span.innerText = termStr;

                // 실시간 상태에 따른 텍스트 강조 이펙트 적용
                if (idx < currentIdx) {
                    span.className = "term-past";
                } else if (idx === currentIdx) {
                    span.className = "term-active";
                    if(isAnimating) {
                        span.style.opacity = 0.5 + progress * 0.5;
                    }
                } else {
                    span.className = "term-future";
                }
                box.appendChild(span);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 그리드 평면 구성
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
            let startGridX = Math.floor(-originX / scale), endGridX = Math.ceil((canvas.width - originX) / scale);
            let startGridY = Math.floor(-originY / scale), endGridY = Math.ceil((canvas.height - originY) / scale);

            for (let x = startGridX; x <= endGridX; x++) {
                let cx = originX + x * scale;
                ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
            }
            for (let y = startGridY; y <= endGridY; y++) {
                let cy = originY - y * scale;
                ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
            }

            // 축선 배치
            ctx.strokeStyle = '#334155'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, originY); ctx.lineTo(canvas.width, originY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(originX, 0); ctx.lineTo(originX, canvas.height); ctx.stroke();

            // 2. 오리지널 초월함수 선 배치 (Green)
            ctx.strokeStyle = '#34d399'; ctx.lineWidth = 3;
            ctx.beginPath();
            let first = true;
            for (let scrX = 0; scrX < canvas.width; scrX++) {
                let mathX = (scrX - originX) / scale;
                let mathY = Functions[currentFunc](mathX);
                let scrY = originY - mathY * scale;
                if (first) { ctx.moveTo(scrX, scrY); first = false; } else { ctx.lineTo(scrX, scrY); }
            }
            ctx.stroke();

            // 데이터 구조 로드
            let activeTerms = getActiveTerms(currentFunc, targetMaxDegree);
            
            if (activeTerms.length > 0) {
                // 3. 현재 렌더링 차수 정보 제어
                let activeTermDegree = activeTerms[currentAnimStep];

                document.getElementById('lbl-step-info').innerHTML = isAnimating 
                    ? `🎬 빌드업 중: <span style="color:var(--accent-rose)">${activeTermDegree}차항</span> 조립 및 합성 중...`
                    : `✅ 분석 완료: 총 <span style="color:var(--accent-blue)">${activeTermDegree}차 다항식</span> 합성 상태`;

                renderFormulaUI(activeTerms, currentAnimStep, animProgress);

                // 4. [보라색 점선] 이번 단계에 새로 유입되는 단독 항 그래프
                ctx.strokeStyle = '#c084fc'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
                ctx.beginPath(); first = true;
                for (let scrX = 0; scrX < canvas.width; scrX++) {
                    let mathX = (scrX - originX) / scale;
                    let mathY = calcSingleTerm(currentFunc, mathX, activeTermDegree);
                    let scrY = originY - mathY * scale;
                    if (scrY >= -100 && scrY <= canvas.height + 100) {
                        if (first) { ctx.moveTo(scrX, scrY); first = false; } else { ctx.lineTo(scrX, scrY); }
                    }
                }
                ctx.stroke();
                ctx.setLineDash([]); // 복원

                // 5. [메인 로즈선] 과거항 누적치 + 현재 유입항 분량만큼 애니메이션 비율 반영 합성 곡선
                ctx.strokeStyle = '#f43f5e'; ctx.lineWidth = 3;
                ctx.beginPath(); first = true;
                for (let scrX = 0; scrX < canvas.width; scrX++) {
                    let mathX = (scrX - originX) / scale;
                    
                    // 직전 단계까지의 누적값
                    let yPast = currentAnimStep > 0 ? calcAccumulated(currentFunc, mathX, activeTerms, currentAnimStep - 1) : 0;
                    // 새로 더해지는 값 (여기에 진척도 비율 애니메이션 계수 곱해줌)
                    let yNewContribution = calcSingleTerm(currentFunc, mathX, activeTermDegree) * animProgress;
                    
                    let mathY = yPast + yNewContribution;
                    let scrY = originY - mathY * scale;

                    if (scrY >= -canvas.height && scrY <= canvas.height * 2) {
                        if (first) { ctx.moveTo(scrX, scrY); first = false; } else { ctx.lineTo(scrX, scrY); }
                    }
                }
                ctx.stroke();
            }
        }

        // 루프 프레임 애니메이션 처리기
        function updateAnim(timestamp) {
            if (!isAnimating) return;
            if (!lastTimestamp) lastTimestamp = timestamp;
            let elapsed = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            // 한 항이 조립되는 시간 속도 제어 (값이 작을수록 부드럽고 천천히 참값에 다가감)
            animProgress += elapsed / 1200; 

            if (animProgress >= 1.0) {
                animProgress = 1.0;
                let activeTerms = getActiveTerms(currentFunc, targetMaxDegree);
                
                // 목표 지정 차수까지 아직 남았다면 다음 차수 결합 단계로 이행
                if (currentAnimStep < activeTerms.length - 1) {
                    currentAnimStep++;
                    animProgress = 0.0; // 진척도 리셋 후 다시 빌드업
                } else {
                    isAnimating = false; // 최종 완료
                }
            }

            draw();
            if (isAnimating) {
                requestAnimationFrame(updateAnim);
            }
        }

        function initUI() {
            const selectFunc = document.getElementById('select-func');
            const sliderDegree = document.getElementById('slider-degree');
            const btnAnimate = document.getElementById('btn-animate');

            selectFunc.addEventListener('change', (e) => {
                currentFunc = e.target.value;
                isAnimating = false;
                currentAnimStep = getActiveTerms(currentFunc, targetMaxDegree).length - 1;
                animProgress = 1.0;
                draw();
            });

            sliderDegree.addEventListener('input', (e) => {
                targetMaxDegree = parseInt(e.target.value);
                document.getElementById('lbl-degree').innerText = targetMaxDegree;
                isAnimating = false;
                currentAnimStep = getActiveTerms(currentFunc, targetMaxDegree).length - 1;
                animProgress = 1.0;
                draw();
            });

            btnAnimate.addEventListener('click', () => {
                isAnimating = true;
                currentAnimStep = 0;
                animProgress = 0.0; // 0% 상태에서 결합 시작
                lastTimestamp = 0;
                requestAnimationFrame(updateAnim);
            });

            document.getElementById('btn-reset').addEventListener('click', () => {
                scale = 90;
                originX = canvas.width / 2;
                originY = canvas.height / 2;
                draw();
            });

            // 자유 탐색 드래그 마우스 매핑 코드
            let isDragging = false;
            let prevX, prevY;
            canvas.addEventListener('mousedown', (e) => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
            canvas.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    originX += (e.clientX - prevX); originY += (e.clientY - prevY);
                    prevX = e.clientX; prevY = e.clientY; draw();
                }
            });
            window.addEventListener('mouseup', () => isDragging = false);
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                scale = Math.min(Math.max(30, scale * (e.deltaY < 0 ? 1.1 : 0.9)), 500);
                draw();
            });
        }

        window.addEventListener('resize', resizeCanvas);
        window.onload = function() {
            resizeCanvas();
            initUI();
        };
    </script>
</body>
</html>
